<form id="f">
<input name="url1"><br>
<input name="url2"><br>
<input name="url3"><br>
<input name="url4"><br>
<input name="url5"><br>
<input name="url6"><br><br>

<button type="button" onclick="start()">DESCARGAR</button>
</form>

<div id="progress"></div>

<script>
async function start(){
 let form=new FormData(document.getElementById("f"))
 let r=await fetch("/download",{method:"POST",body:form})
 let ids=await r.json()

 ids.forEach(id=>{
  let el=document.createElement("div")
  document.getElementById("progress").appendChild(el)

  setInterval(async ()=>{
   let p=await fetch("/progress/"+id)
   let d=await p.json()
   el.innerHTML=id+" "+d.progress
  },1000)
 })
}
</script>
