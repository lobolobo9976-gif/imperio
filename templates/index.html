<!DOCTYPE html>
<html>
<body style="background:black;color:#00ffcc;text-align:center">

<h1>🔥 IMPERIO 💀</h1>

👤 {{user}}<br>
💰 Coins: {{coins}}<br>
🎯 Nivel: {{level}} | XP: {{xp}}<br>

<hr>

<form action="/download" method="post">
<button>DESCARGAR</button>
</form>

<hr>

<h3>🎯 Misiones diarias</h3>

{% for m in missions %}
<div>
{{m.text}} → +{{m.reward}} coins
{% if done[loop.index0] == 1 %}
✅
{% else %}
❌
{% endif %}
</div>
{% endfor %}

<hr>

<h3>🛒 Tienda</h3>

<form action="/buy" method="post">
<button>💎 VIP 1 día (50 coins)</button>
</form>

<a href="https://www.paypal.com/donate/?hosted_button_id=QSA278KTS7XMN">
<button>💳 Comprar coins</button>
</a>

<hr>

<h3>⚙️ Admin</h3>

<form action="/give" method="post">
<input name="user" placeholder="usuario">
<input name="coins" placeholder="coins">
<button>Enviar coins</button>
</form>

<br>
<a href="/logout">Salir</a>

</body>
</html>
