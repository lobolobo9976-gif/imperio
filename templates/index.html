<!DOCTYPE html>
<html>
<body style="background:black;color:#00ffc3;text-align:center">

<h1>🔥 IMPERIO 💀</h1>

<p>💰 {{user.coins}}</p>
<p>🎯 Nivel {{user.nivel}}</p>

<!-- BARRA XP -->
<div style="width:80%;background:#222;margin:auto;border-radius:10px">
<div style="width:{{(user.xp/(user.nivel*50))*100}}%;background:#00ffc3;height:10px"></div>
</div>

{% if user.vip > time %}
<p>💎 VIP activo ({{ (user.vip - time)//60 }} min)</p>
{% else %}
<p>💎 No VIP</p>
{% endif %}

<br>

<a href="/misiones">🎯 Misiones</a><br>
<a href="/chat">💬 Chat</a><br>
<a href="/admin">⚙ Admin</a><br>
<a href="/logout">Salir</a>

<h3>VIP</h3>
<a href="/vip/dia">1 Día (50 coins)</a>
<a href="/vip/mes">1 Mes (200 coins)</a>

</body>
</html>
