<!DOCTYPE html>
<html>
<body style="background:black;color:#00ffcc;text-align:center">

<h1>🔥 IMPERIO 💀</h1>

👤 {{user}}<br>
💰 Coins: {{coins}}<br>
🎯 Nivel: {{level}}<br>
XP: {{xp}} / {{need}}<br>

<hr>

<form action="/download" method="post" onsubmit="startBar()">
<input name="url" placeholder="URL YouTube"><br><br>
<button>DESCARGAR</button>
</form>

<div style="width:80%;margin:auto;background:#222">
<div id="bar" style="width:0%;height:20px;background:#00ffcc"></div>
</div>

<script>
function startBar(){
 let w=0;
 let bar=document.getElementById("bar");
 let i=setInterval(()=>{
  w+=10;
  if(w>=100){w=100;clearInterval(i);}
  bar.style.width=w+"%";
 },300);
}
</script>

<hr>

<h3>🎯 Misiones</h3>

{% for m in missions %}
<div>
{{m.text}} (+{{m.reward}})
{% if done[loop.index0] == 1 %}
✅
{% else %}
❌
{% endif %}
</div>
{% endfor %}

<hr>

<h3>🎰 Casino</h3>
<a href="/spin"><button>Girar (5 coins)</button></a>

<hr>

<h3>⚙️ Admin</h3>

<form action="/give" method="post">
<input name="user" placeholder="usuario">
<input name="coins" placeholder="coins">
<button>Enviar</button>
</form>

<br>
<a href="/logout">Salir</a>

</body>
</html>
